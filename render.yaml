services:
  # PostgreSQL Database
  - type: pserv
    name: eustdd-db
    runtime: postgresql
    plan: free
    # This creates a free PostgreSQL database

  # Web Service
  - type: web
    name: eustdd-schedule
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx prisma db push --accept-data-loss && npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: eustdd-db
          property: connectionString
