services:
  - type: web
    name: eustdd-schedule
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npx prisma db push && npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: eustdd-db
          property: connectionString

databases:
  - name: eustdd-db
    databaseName: eustdd_schedule
    user: eustdd_user
