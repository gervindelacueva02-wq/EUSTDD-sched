services:
  - type: web
    name: eustdd-schedule
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: eustdd-db
          property: connectionString
      - key: DIRECT_DATABASE_URL
        fromDatabase:
          name: eustdd-db
          property: connectionString

databases:
  - name: eustdd-db
    region: oregon
    plan: free